<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>AI Bot - Test UI</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 60px auto; background: #f5f5f5; }
    h1 { color: #2d6a4f; }
    #chat-box { background: white; border: 1px solid #ccc; border-radius: 8px;
                height: 350px; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
    .user-msg { color: #1565c0; margin: 8px 0; }
    .bot-msg  { color: #2d6a4f; margin: 8px 0; background: #e8f5e9;
                padding: 8px; border-radius: 6px; }
    .error-msg { color: #c62828; }
    #input-area { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; }
    #send-btn { padding: 10px 20px; background: #2d6a4f; color: white;
                border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    #send-btn:hover { background: #1b4332; }
    #clear-btn { padding: 10px 16px; background: #e53935; color: white;
                 border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    #status { margin-top: 10px; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <h1>🌿 Ethical AI Assistant — Test</h1>
  <div id="chat-box"></div>
  <div id="input-area">
    <input id="user-input" type="text" placeholder="Posez votre question ici..." />
    <button id="send-btn">Envoyer</button>
    <button id="clear-btn">Effacer</button>
  </div>
  <div id="status"></div>

  <script>
    const API_URL = "http://127.0.0.1:8000/chat";

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const chatBox = document.getElementById("chat-box");
      const status = document.getElementById("status");
      const message = input.value.trim();
      if (!message) return;

      chatBox.innerHTML += `<div class="user-msg"><b>Vous :</b> ${message}</div>`;
      input.value = "";
      status.textContent = "En attente de la réponse...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message })
        });
        const data = await response.json();
        chatBox.innerHTML += `<div class="bot-msg"><b>AI :</b> ${data.reply}</div>`;
        status.textContent = "";
      } catch (err) {
        chatBox.innerHTML += `<div class="error-msg"><b>Erreur :</b> Impossible de contacter le serveur. Assurez-vous que le backend tourne sur le port 8000.</div>`;
        status.textContent = "";
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("clear-btn").addEventListener("click", () => {
      document.getElementById("chat-box").innerHTML = "";
    });
    document.getElementById("user-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
